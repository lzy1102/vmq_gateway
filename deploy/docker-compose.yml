services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    expose:
      - "8080"
    environment:
      - DB_DRIVER=sqlite
      - DB_PATH=/data/vmq_gateway.db
      - ADMIN_USER=admin
      - ADMIN_PASS=vmq_gateway
    volumes:
      - app_data:/data

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  app_data:
