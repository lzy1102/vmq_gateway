<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V免签管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 20px; }
.login-box { max-width: 360px; margin: 80px auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.login-box h2 { margin-bottom: 20px; text-align: center; }
.login-box input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 12px; font-size: 14px; }
.login-box button { width: 100%; padding: 10px; background: #3498db; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
.login-box button:hover { background: #2980b9; }
.error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab { padding: 10px 20px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; }
.tab.active { background: #3498db; color: #fff; border-color: #3498db; }
.panel { display: none; background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.panel.active { display: block; }
.form-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
.form-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
.form-row button { padding: 8px 16px; background: #3498db; color: #fff; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
.form-row button:hover { background: #2980b9; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; margin-top: 16px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #f8f9fa; font-weight: 600; }
.status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.status.online { background: #d4edda; color: #155724; }
.status.offline { background: #f8d7da; color: #721c24; }
.key-cell { font-family: monospace; font-size: 13px; background: #f8f9fa; padding: 4px 8px; border-radius: 4px; user-select: all; }
.toast { position: fixed; top: 20px; right: 20px; background: #27ae60; color: #fff; padding: 12px 20px; border-radius: 6px; display: none; z-index: 100; }
.empty { color: #999; padding: 20px; text-align: center; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.logout { background: none; border: 1px solid #ddd; padding: 6px 12px; border-radius: 4px; cursor: pointer; color: #666; font-size: 13px; }
.logout:hover { border-color: #e74c3c; color: #e74c3c; }
#adminPanel { display: none; }
</style>
</head>
<body>

<div class="login-box" id="loginBox">
<h2>管理后台登录</h2>
<div class="error" id="loginError"></div>
<input id="loginUser" placeholder="用户名" value="admin">
<input id="loginPass" type="password" placeholder="密码">
<button onclick="doLogin()">登录</button>
</div>

<div class="container" id="adminPanel">
<div class="header">
<h1>V免签管理后台</h1>
<button class="logout" onclick="doLogout()">退出登录</button>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab('devices')">设备管理</div>
<div class="tab" onclick="switchTab('pools')">支付池</div>
<div class="tab" onclick="switchTab('bindings')">服务绑定</div>
</div>

<div class="panel active" id="panel-devices">
<div class="form-row">
<input id="newDeviceId" placeholder="设备ID（如 phone_a）">
<button onclick="addDevice()">添加设备</button>
</div>
<div class="table-wrap"><table><thead><tr><th>设备ID</th><th>Key（填入APP）</th><th>状态</th><th>上次心跳</th></tr></thead>
<tbody id="deviceList"></tbody></table></div>
</div>

<div class="panel" id="panel-pools">
<div class="form-row">
<input id="newPoolId" placeholder="池子ID">
<input id="newPoolName" placeholder="池子名称">
<button onclick="addPool()">创建池子</button>
</div>
<div class="table-wrap"><table><thead><tr><th>池子ID</th><th>名称</th><th>包含设备</th></tr></thead>
<tbody id="poolList"></tbody></table></div>
</div>

<div class="panel" id="panel-bindings">
<div class="form-row">
<input id="newServiceId" placeholder="服务ID">
<input id="newCallbackUrl" placeholder="回调URL">
<input id="newBindDevice" placeholder="绑定设备ID（可选）">
<input id="newBindPool" placeholder="绑定池子ID（可选）">
<button onclick="addBinding()">创建绑定</button>
</div>
<div class="table-wrap"><table><thead><tr><th>服务ID</th><th>回调URL</th><th>绑定设备</th><th>绑定池子</th></tr></thead>
<tbody id="bindingList"></tbody></table></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}

async function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    if(!user||!pass) return;
    const resp = await fetch('/admin/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username:user, password:pass})
    });
    const data = await resp.json();
    if(data.code===1) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadDevices();
    } else {
        const err = document.getElementById('loginError');
        err.textContent = data.msg;
        err.style.display = 'block';
    }
}

async function doLogout() {
    await fetch('/admin/logout', {method:'POST'});
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginBox').style.display = 'block';
}

async function checkAuth() {
    try {
        const resp = await fetch('/admin/devices');
        if(resp.status===401) return false;
        return true;
    } catch { return false; }
}

function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-'+name).classList.add('active');
    if(name==='devices') loadDevices();
    if(name==='pools') loadPools();
    if(name==='bindings') loadBindings();
}

async function addDevice() {
    const id = document.getElementById('newDeviceId').value.trim();
    if(!id) return;
    const resp = await fetch('/admin/device', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({device_id: id})
    });
    const data = await resp.json();
    if(data.code===1) {
        toast('Key: ' + data.data.key);
        document.getElementById('newDeviceId').value = '';
        loadDevices();
    }
}

async function loadDevices() {
    const resp = await fetch('/admin/devices');
    if(resp.status===401) { doLogout(); return; }
    const data = await resp.json();
    const list = document.getElementById('deviceList');
    if(!data.data||!data.data.length) { list.innerHTML='<tr><td colspan="4" class="empty">暂无设备</td></tr>'; return; }
    list.innerHTML = data.data.map(d => `<tr>
        <td>${d.device_id}</td>
        <td><span class="key-cell">${d.key}</span></td>
        <td><span class="status ${d.status}">${d.status}</span></td>
        <td>${d.last_heartbeat ? new Date(d.last_heartbeat*1000).toLocaleString() : '-'}</td>
    </tr>`).join('');
}

async function addPool() {
    const id = document.getElementById('newPoolId').value.trim();
    const name = document.getElementById('newPoolName').value.trim();
    if(!id||!name) return;
    await fetch('/admin/pool', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pool_id: id, name: name})
    });
    document.getElementById('newPoolId').value = '';
    document.getElementById('newPoolName').value = '';
    loadPools();
}

async function loadPools() {
    const resp = await fetch('/admin/pools');
    if(resp.status===401) { doLogout(); return; }
    const data = await resp.json();
    const list = document.getElementById('poolList');
    if(!data.data||!data.data.length) { list.innerHTML='<tr><td colspan="3" class="empty">暂无池子</td></tr>'; return; }
    list.innerHTML = data.data.map(p => `<tr>
        <td>${p.pool_id}</td>
        <td>${p.name}</td>
        <td>${(p.device_ids||[]).join(', ')||'空'}</td>
    </tr>`).join('');
}

async function addBinding() {
    const serviceId = document.getElementById('newServiceId').value.trim();
    const callbackUrl = document.getElementById('newCallbackUrl').value.trim();
    const deviceId = document.getElementById('newBindDevice').value.trim();
    const poolId = document.getElementById('newBindPool').value.trim();
    if(!serviceId||!callbackUrl) return;
    const body = {service_id: serviceId, callback_url: callbackUrl};
    if(deviceId) body.device_id = deviceId;
    if(poolId) body.pool_id = poolId;
    await fetch('/admin/binding', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
    });
    document.getElementById('newServiceId').value = '';
    document.getElementById('newCallbackUrl').value = '';
    document.getElementById('newBindDevice').value = '';
    document.getElementById('newBindPool').value = '';
    loadBindings();
}

async function loadBindings() {
    const resp = await fetch('/admin/bindings');
    if(resp.status===401) { doLogout(); return; }
    const data = await resp.json();
    const list = document.getElementById('bindingList');
    if(!data.data||!data.data.length) { list.innerHTML='<tr><td colspan="4" class="empty">暂无绑定</td></tr>'; return; }
    list.innerHTML = data.data.map(b => `<tr>
        <td>${b.service_id}</td>
        <td>${b.callback_url}</td>
        <td>${b.device_id||'-'}</td>
        <td>${b.pool_id||'-'}</td>
    </tr>`).join('');
}

checkAuth().then(ok => {
    if(ok) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadDevices();
    }
});
</script>
</body>
</html>
