<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V免签支付</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
}
.card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 32px 24px;
    max-width: 400px;
    width: 100%;
    text-align: center;
}
.card h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
.pkg-name { font-size: 14px; color: #888; margin-bottom: 20px; }
.amount {
    font-size: 36px;
    font-weight: 700;
    color: #e74c3c;
    margin-bottom: 8px;
    font-family: monospace;
}
.warning {
    font-size: 13px;
    color: #e67e22;
    background: #fef5e7;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 24px;
    line-height: 1.5;
}
.qr-wrapper { margin-bottom: 20px; }
.qr-code {
    max-width: 200px;
    width: 100%;
    border: 1px solid #eee;
    border-radius: 8px;
}
.countdown {
    font-size: 28px;
    font-family: "Courier New", monospace;
    color: #333;
    margin-bottom: 12px;
}
.status {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 20px;
    padding: 10px;
    border-radius: 6px;
}
.status.pending { color: #3498db; background: #eaf2fd; }
.status.paid { color: #27ae60; background: #eafaf1; }
.status.expired { color: #999; background: #f0f0f0; }
.status.cancelled { color: #999; background: #f0f0f0; }
.cancel-btn {
    background: #fff;
    color: #999;
    border: 1px solid #ddd;
    padding: 10px 32px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
}
.cancel-btn:hover { border-color: #e74c3c; color: #e74c3c; }
.btn-group { display: none; margin-top: 16px; }
.btn-group.show { display: block; }
.retry-btn {
    background: #3498db;
    color: #fff;
    border: none;
    padding: 12px 40px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
}
</style>
</head>
<body>
<div class="card">
    <h2>扫码支付</h2>
    <div class="pkg-name" id="pkgName">-</div>
    <div class="amount" id="amountDisplay">¥0.00</div>
    <div class="warning">请使用支付宝扫描下方二维码支付<br>务必支付<strong>精确金额</strong>，否则无法到账</div>
    <div class="qr-wrapper"><img class="qr-code" id="qrImage" src="" alt="支付宝收款码"></div>
    <div class="countdown" id="countdown">10:00</div>
    <div class="status pending" id="statusText">等待支付...</div>
    <button class="cancel-btn" id="cancelBtn" onclick="handleCancel()">取消订单</button>
    <div class="btn-group" id="btnGroup">
        <button class="retry-btn" onclick="location.reload()">重新支付</button>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const tradeNo = params.get('trade_no');
const amountCents = parseInt(params.get('amount')) || 0;
const qrUrl = params.get('qr') || '/qr/alipay.png';
const pkgName = params.get('pkg_name') || '';

if (!tradeNo) {
    document.querySelector('.card').innerHTML = '<h2>参数错误</h2><p style="color:#999;margin-top:12px">缺少订单号</p>';
} else {
    const amountYuan = (amountCents / 100).toFixed(2);
    document.getElementById('amountDisplay').textContent = '¥' + amountYuan;
    document.getElementById('qrImage').src = qrUrl;
    document.getElementById('pkgName').textContent = pkgName;
}

let remaining = 600; // 10 分钟
let pollTimer = null;
let countdownTimer = null;
let settled = false;

function updateCountdown() {
    if (settled) return;
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    document.getElementById('countdown').textContent =
        String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    if (remaining <= 0) {
        updateStatusUI('expired', '订单已过期');
        clearInterval(countdownTimer);
    }
    remaining--;
}

function updateStatusUI(status, text) {
    settled = true;
    const el = document.getElementById('statusText');
    el.className = 'status ' + status;
    el.textContent = text;
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('btnGroup').classList.add('show');
    clearInterval(pollTimer);
}

function handleCancel() {
    document.getElementById('cancelBtn').disabled = true;
    document.getElementById('cancelBtn').textContent = '取消中...';
    updateStatusUI('cancelled', '订单已取消');
}

function updateStatus(status) {
    if (settled) return;
    switch (status) {
    case 'paid':
        clearInterval(countdownTimer);
        updateStatusUI('paid', '支付成功！');
        break;
    case 'cancelled':
        clearInterval(countdownTimer);
        updateStatusUI('cancelled', '订单已取消');
        break;
    }
}

function startPolling() {
    if (!tradeNo) return;
    pollTimer = setInterval(async () => {
        if (settled) return;
        try {
            const resp = await fetch('/api/recharge/vmpay-status?trade_no=' + encodeURIComponent(tradeNo));
            const data = await resp.json();
            if (data.code === 1 && data.data) {
                updateStatus(data.data.status);
            }
        } catch (e) {
            // 忽略网络错误，继续轮询
        }
    }, 3000);
}

countdownTimer = setInterval(updateCountdown, 1000);
startPolling();
</script>
</body>
</html>
